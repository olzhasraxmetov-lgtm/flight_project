services:
  db:
    image: postgres:15
    container_name: flight_db
    ports:
      - "5433:5432"
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7.4-alpine
    container_name: flight_redis
    ports:
      - "7272:6379"

  celery_worker:
    build: .
    container_name: 'celery_worker'
    command: celery -A app.tasks.celery_app:celery_app worker --loglevel=info
    env_file:
      - ".env"
    depends_on:
      - redis
      - db
    working_dir: /code

  celery_beat:
    build: .
    container_name: 'celery_beat'
    command: celery -A app.tasks.celery_app:celery_app beat --loglevel=info
    env_file:
      - ".env"
    depends_on:
      - redis
      - db

  flower:
    build: .
    container_name: flight_flower
    command: celery -A app.tasks.celery_app:celery_app flower --port=5555
    ports:
      - "5555:5555"
    env_file:
      - .env
    working_dir: /code
    depends_on:
      - redis


  app:
    build: .
    volumes:
      - .:/code
    working_dir: /code
    ports:
      - "8000:8000"
    container_name: flight_app
    command: >
      sh -c "alembic upgrade head && 
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    depends_on:
      - db


volumes:
  postgres_data: